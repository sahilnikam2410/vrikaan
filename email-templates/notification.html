<div style="max-width:600px;margin:0 auto;font-family:'Segoe UI',Arial,sans-serif;background:#030712;color:#f1f5f9;border-radius:12px;overflow:hidden">
  <div style="background:linear-gradient(135deg,#6366f1,#14e3c5);padding:32px;text-align:center">
    <div style="width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.2);display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;margin-bottom:10px">S</div>
    <h1 style="margin:0;font-size:20px;color:#fff">{{subject}}</h1>
  </div>
  <div style="padding:32px">
    <p style="font-size:15px;color:#f1f5f9;margin:0 0 16px">Hi {{to_name}},</p>

    <div style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);border-radius:10px;padding:20px;margin-bottom:24px">
      <p style="font-size:14px;color:#cbd5e1;line-height:1.8;margin:0;white-space:pre-line">{{message}}</p>
    </div>

    <div style="text-align:center;margin-bottom:20px">
      <a href="https://secuvion.vercel.app/dashboard" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#6366f1,#14e3c5);color:#fff;text-decoration:none;border-radius:8px;font-weight:700;font-size:14px">Open SECUVION</a>
    </div>

    <p style="font-size:12px;color:#64748b;line-height:1.6;margin:0;text-align:center">Questions? Reach us at <a href="https://secuvion.vercel.app/contact" style="color:#6366f1;text-decoration:none">secuvion.vercel.app/contact</a></p>
  </div>
  <div style="padding:16px 32px;border-top:1px solid rgba(148,163,184,0.08);text-align:center">
    <p style="font-size:11px;color:#475569;margin:0">&copy; 2026 SECUVION. AI-powered cyber defense for everyone.</p>
  </div>
</div>
