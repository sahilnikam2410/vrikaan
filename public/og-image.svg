<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#14e3c5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14e3c5;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Glow circle -->
  <circle cx="900" cy="315" r="280" fill="url(#glow)"/>

  <!-- Shield icon -->
  <g transform="translate(880, 180)">
    <path d="M40 0 L80 20 L80 50 C80 85 60 110 40 120 C20 110 0 85 0 50 L0 20 Z" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <path d="M40 15 L70 30 L70 52 C70 78 55 98 40 106 C25 98 10 78 10 52 L10 30 Z" fill="url(#accent)" opacity="0.1"/>
    <text x="40" y="72" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="url(#accent)">S</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Logo text -->
  <text x="80" y="280" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" fill="#f1f5f9" letter-spacing="2">VRIKAAN</text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="'Inter', sans-serif" font-size="28" fill="#94a3b8">AI-Powered Cyber Defense Platform</text>

  <!-- Features row -->
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
    <text x="90" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#6366f1" font-weight="600">Fraud Detection</text>

    <rect x="200" y="0" width="200" height="36" rx="18" fill="rgba(20,227,197,0.08)" stroke="rgba(20,227,197,0.2)" stroke-width="1"/>
    <text x="300" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#14e3c5" font-weight="600">Identity Protection</text>

    <rect x="420" y="0" width="190" height="36" rx="18" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="515" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#a78bfa" font-weight="600">Dark Web Monitor</text>
  </g>

  <!-- Stats -->
  <text x="80" y="510" font-family="monospace" font-size="14" fill="#64748b">99.7% Detection Rate  |  12B+ Threat Signatures  |  24/7 Active Monitoring</text>

  <!-- URL -->
  <text x="80" y="570" font-family="monospace" font-size="16" fill="url(#accent)">vrikaan.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>
</svg>
