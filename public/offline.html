<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - VRIKAAN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #030712; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; color: #f1f5f9; }
    .container { text-align: center; padding: 40px 24px; max-width: 440px; }
    .shield { width: 64px; height: 64px; margin: 0 auto 24px; opacity: 0.6; }
    .shield svg { width: 100%; height: 100%; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .status { margin-top: 20px; font-size: 12px; color: #64748b; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="8" y1="11" x2="16" y2="11"/>
      </svg>
    </div>
    <h1>VRIKAAN</h1>
    <p>You appear to be offline. Please check your internet connection and try again. Your security tools will be back once you're connected.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="status"><span class="dot"></span>No connection detected</div>
  </div>
</body>
</html>
